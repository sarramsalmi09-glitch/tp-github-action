name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Build Backend Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/backend-tp:latest ./springboot/app
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/backend-tp:latest
      
      - name: Build Frontend Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/frontend-tp:latest ./angular-app
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/frontend-tp:latest
      
      - name: Test with Docker Compose
        run: |
          docker-compose up -d
          sleep 20
          docker-compose ps
          docker-compose down
